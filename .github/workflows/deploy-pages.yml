name: deploy-pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

# Quyền cần cho GitHub Pages qua Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ giữ 1 lần deploy mới nhất
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Cài dependency
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Build (base /tiktok/)
        working-directory: web
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
