<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kết nối TikTok — Non Son Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #0B1220; --card: #111A2E; --line: #1E2A44; --line2: #26355A;
      --gold: #CBA45A; --gold2: #E1C489; --teal: #3FB6A8; --ink: #E6EBF2;
      --mut: #8FA3BF; --mut2: #5C6E8A; --red: #E5635B;
      --fh: "Space Grotesk", -apple-system, "Segoe UI", sans-serif;
      --fb: "Be Vietnam Pro", -apple-system, "Segoe UI", sans-serif;
      --fm: "JetBrains Mono", ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background:
        radial-gradient(1200px 600px at 50% -10%, #10203a 0%, transparent 60%), var(--bg);
      color: var(--ink); font-family: var(--fb);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .wrap { width: 100%; max-width: 420px; }
    .brand { text-align: center; font-family: var(--fh); font-weight: 700; letter-spacing: 3px; font-size: .78rem; color: var(--gold); margin-bottom: 14px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 36px 28px; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,.35); }
    .badge { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--teal); }
    .badge.err { border-color: var(--red); }
    h1 { font-family: var(--fh); font-size: 1.35rem; letter-spacing: .3px; margin: 0 0 6px; }
    .gold { color: var(--gold); }
    p { color: var(--mut); font-size: .95rem; line-height: 1.6; margin: 6px 0; }
    .handle { display: inline-block; margin-top: 14px; padding: 8px 16px; border: 1px solid var(--line2); border-radius: 999px; color: var(--teal); font-weight: 600; font-family: var(--fm); }
    .foot { margin-top: 22px; color: var(--mut2); font-size: .8rem; }
    code { font-family: var(--fm); color: var(--gold); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">NON SON ANALYTICS</div>
    <div class="card">
      <div class="badge" id="badge">
        <svg id="ic-ok" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#3FB6A8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        <svg id="ic-err" style="display:none" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#E5635B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </div>
      <h1 id="title">Đang xử lý…</h1>
      <p id="msg"></p>
      <div class="handle" id="handle" style="display:none"></div>
      <p class="foot">Non Son Analytics</p>
    </div>
  </div>
  <script type="module" src="/src/ketnoi.ts"></script>
</body>
</html>
